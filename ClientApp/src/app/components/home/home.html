<h2>Vehicle List</h2>

<table border="1" cellpadding="5">
    <thead>
        <tr>
            <th>Make</th>
            <th>Model</th>
            <th>Year</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let v of vehicles">
            <td>{{ v.make }}</td>
            <td>{{ v.model }}</td>
            <td>{{ v.year }}</td>
        </tr>
    </tbody>
</table>

<h3>Add Vehicle</h3>

<form (ngSubmit)="addVehicle()">
    <input [(ngModel)]="newVehicle.make" name="make" placeholder="Make" required />
    <input [(ngModel)]="newVehicle.model" name="model" placeholder="Model" required />
    <input [(ngModel)]="newVehicle.year" name="year" type="number" />

    <button type="submit">Add</button>
</form>
